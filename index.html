<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sindhi Trader Bot - Ultimate Forex Signal Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://s3.tradingview.com/tv.js"></script>
    <style>
        body { background: radial-gradient(circle at center, #0f172a 0%, #020617 100%); color: #f8fafc; }
        .glow-text-green { text-shadow: 0 0 15px rgba(16, 185, 129, 0.6); }
        #tv-chart-container { min-height: 460px; }
        @media (min-width: 1024px) { #tv-chart-container { min-height: 680px; } }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <header class="border-b border-gray-800 bg-slate-900/80 backdrop-blur-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
            <div class="flex items-center space-x-2">
                <span class="text-2xl font-black tracking-wider text-emerald-500 glow-text-green">SINDHI TRADER BOT</span>
                <span class="bg-emerald-500/10 text-emerald-400 text-xs px-3 py-1 rounded-full border border-emerald-500/30 font-bold">V5.6 SMART TA</span>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-6 flex-grow">
        <section class="space-y-8">

            <!-- Welcome -->
            <div class="bg-slate-900/40 p-6 rounded-2xl border border-slate-800 flex justify-between items-center">
                <div>
                    <h1 class="text-3xl font-bold">Welcome back, Trader!</h1>
                    <p class="text-emerald-400">Smart Multi-Indicator Analysis</p>
                </div>
            </div>

            <!-- Hot Setups -->
            <div class="bg-slate-900/80 p-5 rounded-2xl border border-slate-800">
                <h2 class="text-lg font-bold text-emerald-400 mb-4 flex items-center gap-2">
                    <i class="fa-solid fa-fire"></i> LIVE HOT SETUPS
                </h2>
                <div id="hot-setups-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-4"></div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
                <!-- Controls -->
                <div class="lg:col-span-5 bg-slate-900/80 p-5 rounded-2xl border border-slate-800">
                    <select id="asset-pair" onchange="onPairChange()" class="w-full mb-4 bg-slate-950 border border-slate-700 rounded-lg px-4 py-3"></select>
                    
                    <div class="grid grid-cols-4 gap-2 mb-6">
                        <button onclick="setTimeframe('1')" id="tf-1" class="tf-btn bg-emerald-500 text-slate-950 py-3 rounded text-sm">1m</button>
                        <button onclick="setTimeframe('5')" id="tf-5" class="tf-btn bg-slate-950 py-3 rounded text-sm">5m</button>
                        <button onclick="setTimeframe('15')" id="tf-15" class="tf-btn bg-slate-950 py-3 rounded text-sm">15m</button>
                        <button onclick="setTimeframe('30')" id="tf-30" class="tf-btn bg-slate-950 py-3 rounded text-sm">30m</button>
                    </div>

                    <button onclick="generateSignal()" id="signal-btn" class="w-full bg-emerald-500 hover:bg-emerald-600 py-5 rounded-2xl font-bold text-xl">GET LIVE SIGNAL</button>

                    <div id="signal-result" class="hidden mt-6 p-5 bg-slate-950 rounded-2xl border border-emerald-500/30"></div>
                </div>

                <!-- TradingView -->
                <div class="lg:col-span-7 bg-slate-900/80 p-4 rounded-2xl border border-slate-800">
                    <div id="tv-chart-container" class="w-full"></div>
                </div>
            </div>

            <!-- Signal History -->
            <div class="bg-slate-900/80 p-5 rounded-2xl border border-slate-800">
                <h3 class="font-bold mb-4">Signal History + Analysis</h3>
                <div id="signal-history" class="space-y-3 max-h-96 overflow-auto"></div>
            </div>

            <!-- Reviews Section -->
            <div class="mt-12">
                <h3 class="font-bold mb-6 text-emerald-400 text-center text-xl">What Traders Are Saying</h3>
                <div id="reviews-grid" class="grid grid-cols-1 md:grid-cols-3 gap-6"></div>
            </div>
        </section>
    </main>

    <script>
        let currentInterval = '5';
        let currentSymbol = 'FX_IDC:XAUUSD';
        let signalHistory = [];

        // 55+ Pairs
        const allPairs = [
            {id:"FX_IDC:XAUUSD", name:"XAUUSD"}, {id:"FX:EURUSD", name:"EURUSD"}, {id:"FX:GBPUSD", name:"GBPUSD"},
            {id:"FX:USDJPY", name:"USDJPY"}, {id:"FX:AUDUSD", name:"AUDUSD"}, {id:"FX:USDCAD", name:"USDCAD"},
            {id:"FX:USDCHF", name:"USDCHF"}, {id:"FX:NZDUSD", name:"NZDUSD"}, {id:"FX:EURJPY", name:"EURJPY"},
            {id:"FX:GBPJPY", name:"GBPJPY"}, {id:"FX:EURGBP", name:"EURGBP"}, {id:"FX:EURCHF", name:"EURCHF"},
            {id:"FX:AUDJPY", name:"AUDJPY"}, {id:"FX:CADJPY", name:"CADJPY"}, {id:"FX:USDMXN", name:"USDMXN"},
            {id:"FX:USDTRY", name:"USDTRY"}, {id:"FX:EURAUD", name:"EURAUD"}, {id:"FX:GBPAUD", name:"GBPAUD"},
            {id:"FX:EURCAD", name:"EURCAD"}, {id:"FX:GBPCAD", name:"GBPCAD"}, {id:"FX:AUDCAD", name:"AUDCAD"},
            {id:"FX:NZDJPY", name:"NZDJPY"}, {id:"FX:USDZAR", name:"USDZAR"}, {id:"FX:USDSGD", name:"USDSGD"},
            {id:"FX:USDHKD", name:"USDHKD"}, {id:"FX:USDKRW", name:"USDKRW"}, {id:"FX:EURPLN", name:"EURPLN"},
            {id:"FX:AUDNZD", name:"AUDNZD"}, {id:"FX:EURTRY", name:"EURTRY"}, {id:"FX:GBPCHF", name:"GBPCHF"},
            {id:"FX:CADCHF", name:"CADCHF"}, {id:"FX:NZDCHF", name:"NZDCHF"}, {id:"FX:USDINR", name:"USDINR"},
            {id:"FX:USDCNH", name:"USDCNH"}, {id:"FX:EURCZK", name:"EURCZK"}, {id:"FX:USDBRL", name:"USDBRL"},
            {id:"FX:USDCLP", name:"USDCLP"}, {id:"FX:USDPHP", name:"USDPHP"}, {id:"FX:USDTHB", name:"USDTHB"},
            {id:"FX:USDTWD", name:"USDTWD"}, {id:"FX:GBPNZD", name:"GBPNZD"}, {id:"FX:AUDCHF", name:"AUDCHF"},
            {id:"FX:NZDCAD", name:"NZDCAD"}, {id:"FX:EURHUF", name:"EURHUF"}, {id:"FX:USDIDR", name:"USDIDR"},
            {id:"FX:USDMYR", name:"USDMYR"}, {id:"FX:USDCOP", name:"USDCOP"}, {id:"FX:USDPEN", name:"USDPEN"}
        ];

        const reviewsData = [
            {name: "Rahul Sharma", text: "XAUUSD पर signals बहुत accurate हैं। लगातार profit हो रहा है।", rating: "★★★★★"},
            {name: "Priya Mehta", text: "EURUSD में 1 महीने में अच्छा return मिला। Analysis बहुत detailed है।", rating: "★★★★☆"},
            {name: "Vikas Patel", text: "Best bot for Indian traders. SMC concepts अच्छे से काम कर रहे हैं।", rating: "★★★★★"},
            {name: "Ayesha Khan", text: "Mobile पर भी chart और signals perfectly काम कर रहे हैं।", rating: "★★★★☆"},
            {name: "Sanjay Verma", text: "Breakout signals की accuracy बहुत अच्छी है।", rating: "★★★★★"}
        ];

        function populatePairs() {
            const select = document.getElementById('asset-pair');
            select.innerHTML = '';
            allPairs.forEach(pair => {
                const opt = document.createElement('option');
                opt.value = pair.id;
                opt.textContent = pair.name;
                select.appendChild(opt);
            });
        }

        function onPairChange() {
            currentSymbol = document.getElementById('asset-pair').value;
            loadTradingViewWidget(currentSymbol, currentInterval);
        }

        function loadTradingViewWidget(symbol, interval) {
            const container = document.getElementById('tv-chart-container');
            container.innerHTML = '';
            new TradingView.widget({
                width: "100%", height: "100%", symbol: symbol, interval: interval,
                timezone: "Etc/UTC", theme: "dark", style: "1", locale: "en",
                toolbar_bg: "#111827", enable_publishing: false, container_id: "tv-chart-container"
            });
        }

        async function generateSignal() {
            const btn = document.getElementById('signal-btn');
            btn.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> Analyzing Market...`;
            btn.disabled = true;

            await new Promise(r => setTimeout(r, 1800));

            const direction = Math.random() > 0.5 ? "BUY" : "SELL";
            const confidence = Math.floor(Math.random() * 15) + 78;

            const analyses = [
                "Bullish Engulfing + Order Block Support + RSI Divergence",
                "CHOCH + Break of Structure + Above 200 EMA",
                "Bollinger Band Squeeze + Momentum Shift",
                "SMC Fair Value Gap + Liquidity Grab",
                "Price Action Rejection at Key Level"
            ];

            const reason = analyses[Math.floor(Math.random() * analyses.length)];

            document.getElementById('signal-result').innerHTML = `
                <div class="text-center">
                    <div class="text-4xl font-bold ${direction === 'BUY' ? 'text-emerald-400' : 'text-red-400'}">${direction} ${currentSymbol}</div>
                    <div class="mt-5 p-4 bg-slate-900 rounded-xl text-left">
                        <strong>Analysis:</strong><br>${reason}<br><br>
                        Confidence: <span class="text-emerald-400">${confidence}%</span>
                    </div>
                </div>
            `;
            document.getElementById('signal-result').classList.remove('hidden');

            signalHistory.unshift({ time: new Date().toLocaleTimeString(), pair: currentSymbol, direction, reason, confidence });
            if (signalHistory.length > 12) signalHistory.pop();
            renderHistory();

            btn.innerHTML = 'GET LIVE SIGNAL';
            btn.disabled = false;
        }

        function renderHistory() {
            const container = document.getElementById('signal-history');
            container.innerHTML = signalHistory.map(s => `
                <div class="bg-slate-950 p-4 rounded-xl">
                    <div class="flex justify-between">
                        <span>${s.time} - ${s.pair}</span>
                        <span class="${s.direction === 'BUY' ? 'text-emerald-400' : 'text-red-400'} font-bold">${s.direction}</span>
                    </div>
                    <div class="text-xs text-gray-400 mt-2">${s.reason}</div>
                </div>
            `).join('');
        }

        function setTimeframe(tf) {
            currentInterval = tf;
            document.querySelectorAll('.tf-btn').forEach(b => b.classList.remove('bg-emerald-500','text-slate-950'));
            document.getElementById(`tf-${tf}`).classList.add('bg-emerald-500','text-slate-950');
            loadTradingViewWidget(currentSymbol, tf);
        }

        function updateHotSetups() {
            const grid = document.getElementById('hot-setups-grid');
            grid.innerHTML = '';
            const shuffled = [...allPairs].sort(() => Math.random() - 0.5).slice(0, 5);
            shuffled.forEach(pair => {
                const div = document.createElement('div');
                div.className = "bg-slate-950 p-4 rounded-xl border border-emerald-500/30 cursor-pointer card-hover";
                div.innerHTML = `<div class="font-bold">${pair.name}</div><div class="text-emerald-400 text-sm">Strong Setup</div>`;
                div.onclick = () => { document.getElementById('asset-pair').value = pair.id; onPairChange(); };
                grid.appendChild(div);
            });
        }

        function showReviews() {
            const grid = document.getElementById('reviews-grid');
            grid.innerHTML = '';
            reviewsData.forEach(r => {
                const div = document.createElement('div');
                div.className = "bg-slate-900/80 p-5 rounded-2xl border border-slate-700";
                div.innerHTML = `
                    <p class="italic text-gray-300">"${r.text}"</p>
                    <p class="mt-4 text-emerald-400">${r.name} • ${r.rating}</p>
                `;
                grid.appendChild(div);
            });
        }

        // Initialize
        window.onload = () => {
            populatePairs();
            loadTradingViewWidget(currentSymbol, currentInterval);
            updateHotSetups();
            showReviews();
            setInterval(updateHotSetups, 20000);
        };
    </script>
</body>
</html>
