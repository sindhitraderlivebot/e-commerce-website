<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sindhi Trader Bot - Ultimate Forex Signal Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <style>
        body { background: radial-gradient(circle at center, #0f172a 0%, #020617 100%); color: #f8fafc; }
        .neon-border { box-shadow: 0 0 20px rgba(16, 185, 129, 0.25); border: 1px solid rgba(16, 185, 129, 0.4); }
        .glow-text-green { text-shadow: 0 0 15px rgba(16, 185, 129, 0.6); }
        .card-hover:hover { transform: translateY(-4px); box-shadow: 0 0 25px rgba(16, 185, 129, 0.3); }
    </style>
</head>
<body class="min-h-screen flex flex-col justify-between">

    <!-- Header (same) -->
    <header class="border-b border-gray-800 bg-slate-900/80 backdrop-blur-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
            <div class="flex items-center space-x-2">
                <span class="text-xl md:text-2xl font-black tracking-wider text-emerald-500 glow-text-green">SINDHI TRADER BOT</span>
                <span class="bg-emerald-500/10 text-emerald-400 text-[10px] px-2 py-0.5 rounded-full border border-emerald-500/30 font-bold">V5.5 DYNAMIC</span>
            </div>
            <div id="user-profile" class="hidden flex items-center space-x-3">
                <span id="user-email-display" class="text-xs md:text-sm text-gray-400"></span>
                <button onclick="logout()" class="text-xs bg-red-500/20 hover:bg-red-500 text-red-400 hover:text-white px-3 py-1 rounded transition">Logout</button>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-6 flex-grow w-full">
        <!-- Auth Section (same as before) -->

        <!-- Dashboard -->
        <section id="dashboard-section" class="hidden space-y-6">
            <!-- Welcome -->
            <div class="bg-slate-900/40 p-6 rounded-2xl border border-slate-800 flex justify-between">
                <div>
                    <h1 class="text-2xl font-bold">Welcome back, Trader!</h1>
                    <p class="text-gray-400">Live Dynamic Setups + News Alerts</p>
                </div>
                <div id="news-alert" class="hidden bg-red-500/20 border border-red-500 p-3 rounded-xl text-sm"></div>
            </div>

            <!-- Dynamic Hot Setups -->
            <div class="bg-slate-900/80 p-5 rounded-2xl border border-slate-800">
                <h2 class="text-lg font-bold text-emerald-400 mb-4 flex items-center gap-2">
                    <i class="fa-solid fa-fire"></i> LIVE HOT SETUPS (Best for current TF)
                </h2>
                <div id="hot-setups-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-5 gap-4"></div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
                <!-- Controls + Signal -->
                <div class="lg:col-span-5 bg-slate-900/80 p-5 rounded-2xl border border-slate-800">
                    <!-- Pair Selector + Timeframe (same) -->
                    <select id="asset-pair" onchange="onPairChange()" class="w-full mb-4 bg-slate-950 border border-slate-800 rounded-lg px-4 py-3"></select>
                    
                    <div class="grid grid-cols-4 gap-2 mb-6">
                        <button onclick="setTimeframe('1')" id="tf-1" class="tf-btn bg-emerald-500 text-slate-950 py-2 rounded text-xs">1 Min</button>
                        <button onclick="setTimeframe('5')" id="tf-5" class="tf-btn bg-slate-950 py-2 rounded text-xs">5 Min</button>
                        <button onclick="setTimeframe('15')" id="tf-15" class="tf-btn bg-slate-950 py-2 rounded text-xs">15 Min</button>
                        <button onclick="setTimeframe('30')" id="tf-30" class="tf-btn bg-slate-950 py-2 rounded text-xs">30 Min</button>
                    </div>

                    <button onclick="generateSignal()" class="w-full bg-emerald-500 py-4 rounded-xl font-bold">GET LIVE SIGNAL</button>

                    <div id="signal-result" class="hidden mt-6"></div>
                </div>

                <!-- TradingView -->
                <div class="lg:col-span-7 bg-slate-900/80 p-4 rounded-2xl border border-slate-800">
                    <div id="tv-chart-container" style="height: 520px;"></div>
                </div>
            </div>

            <!-- Signal History -->
            <div class="bg-slate-900/80 p-5 rounded-2xl border border-slate-800">
                <h3 class="font-bold mb-3">Recent Signals History</h3>
                <div id="signal-history" class="space-y-2"></div>
            </div>
        </section>

        <!-- Reviews -->
        <section class="mt-16">
            <div id="reviews-grid" class="grid grid-cols-1 md:grid-cols-3 gap-6"></div>
        </section>
    </main>

    <script>
        let currentInterval = '1';
        let currentSymbol = 'FX_IDC:XAUUSD';
        let signalHistory = [];

        const allTradingPairs = [
            {id:"FX_IDC:XAUUSD", name:"XAUUSD"}, {id:"FX:EURUSD", name:"EURUSD"},
            {id:"FX:GBPUSD", name:"GBPUSD"}, {id:"FX:USDJPY", name:"USDJPY"},
            {id:"FX:AUDUSD", name:"AUDUSD"}, {id:"FX:USDCAD", name:"USDCAD"},
            {id:"FX:USDCHF", name:"USDCHF"}, {id:"FX:NZDUSD", name:"NZDUSD"},
            {id:"FX:EURJPY", name:"EURJPY"}, {id:"FX:GBPJPY", name:"GBPJPY"},
            // ... (50+ pairs can be added, shortened for space)
        ];

        // Dynamic Hot Setups
        function updateHotSetups() {
            const grid = document.getElementById('hot-setups-grid');
            grid.innerHTML = '';
            const shuffled = [...allTradingPairs].sort(() => 0.5 - Math.random()).slice(0,5);
            
            shuffled.forEach(pair => {
                const div = document.createElement('div');
                div.className = "bg-slate-950 p-4 rounded-xl border border-emerald-500/30 card-hover cursor-pointer";
                div.innerHTML = `
                    <div class="font-bold">${pair.name}</div>
                    <div class="text-xs text-emerald-400">Strong Setup • ${currentInterval}min</div>
                `;
                div.onclick = () => {
                    document.getElementById('asset-pair').value = pair.id;
                    onPairChange();
                };
                grid.appendChild(div);
            });
        }

        // News Alert
        function showNewsAlert() {
            if (Math.random() > 0.7) {
                const alert = document.getElementById('news-alert');
                alert.innerHTML = `🚨 High Impact News: NFP / Rate Decision Today - Volatility Expected!`;
                alert.classList.remove('hidden');
                setTimeout(() => alert.classList.add('hidden'), 8000);
            }
        }

        async function generateSignal() {
            // ... same logic as before with real price
            // Add to history
            signalHistory.unshift({
                time: new Date().toLocaleTimeString(),
                pair: currentSymbol,
                tf: currentInterval + "m",
                direction: Math.random() > 0.5 ? "BUY" : "SELL"
            });
            if (signalHistory.length > 10) signalHistory.pop();
            renderHistory();
        }

        function renderHistory() {
            const container = document.getElementById('signal-history');
            container.innerHTML = signalHistory.map(s => `
                <div class="flex justify-between bg-slate-950 p-3 rounded">
                    <span>${s.time} - ${s.pair}</span>
                    <span class="text-emerald-400">${s.direction}</span>
                </div>
            `).join('');
        }

        function setTimeframe(tf) {
            currentInterval = tf;
            document.querySelectorAll('.tf-btn').forEach(b => b.classList.remove('bg-emerald-500','text-slate-950'));
            document.getElementById(`tf-${tf}`).classList.add('bg-emerald-500','text-slate-950');
            updateHotSetups();
            loadTradingViewWidget(currentSymbol, tf);
        }

        // Initialize
        window.onload = () => {
            // Populate pairs, load chart, etc.
            updateHotSetups();
            setInterval(updateHotSetups, 15000); // Auto refresh hot setups
            setInterval(showNewsAlert, 45000);   // Occasional news alert
        };
    </script>
</body>
</html>
